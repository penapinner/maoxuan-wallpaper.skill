<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星星之火，可以燎原 — 毛选语录壁纸</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;400;700;900&family=Ma+Shan+Zheng&display=swap');

  @font-face {
    font-family: 'Hanyi Huangke Xingshu';
    src: local('汉仪黄科行书简'),
         local('Hanyi Huangke Xingshu Jian'),
         local('HanyiHuangKexingshuJian'),
         url('file:///C:/Users/admin/AppData/Local/Microsoft/Windows/Fonts/hanyihuangkexingshujian.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: 'Noto Serif SC', 'SimSun', serif;
    background: #f7f1e3;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  .wallpaper {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background:
      radial-gradient(ellipse 50% 35% at 50% 48%, rgba(255, 230, 180, 0.6) 0%, transparent 70%),
      radial-gradient(ellipse 25% 15% at 50% 45%, rgba(255, 210, 120, 0.25) 0%, transparent 60%),
      linear-gradient(160deg, #eee6d2 0%, #f7f1e3 30%, #faf6ea 50%, #f2ebd7 70%, #e9e0cc 100%);
  }

  /* ---------- 背景纹理 ---------- */
  .texture-overlay {
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    opacity: 0.6;
  }

  .vignette {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 80% 70% at center, transparent 50%, rgba(120, 100, 70, 0.15) 100%);
    pointer-events: none;
  }

  /* ---------- 火星粒子 ---------- */
  .sparks {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  .spark {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(220, 160, 40, 0.8), rgba(200, 130, 20, 0.3) 50%, transparent 70%);
    filter: blur(0.5px);
    animation: floatUp linear infinite;
  }

  @keyframes floatUp {
    0% {
      transform: translateY(0) scale(0.5);
      opacity: 0;
    }
    10% { opacity: 1; }
    80% { opacity: 0.8; }
    100% {
      transform: translateY(-100vh) scale(1.2);
      opacity: 0;
    }
  }

  /* ---------- 中央暖金光晕 ---------- */
  .fire-glow {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255, 210, 120, 0.2) 0%, rgba(255, 190, 70, 0.08) 40%, transparent 70%);
    animation: breathe 4s ease-in-out infinite;
    pointer-events: none;
  }

  @keyframes breathe {
    0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
    50% { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
  }

  /* ---------- 主内容区 ---------- */
  .content {
    position: relative;
    z-index: 10;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 80px;
  }

  /* ---------- 印章 ---------- */
  .seal {
    position: absolute;
    top: 60px;
    right: 80px;
    width: 72px;
    height: 72px;
    border: 2.5px solid rgba(200, 30, 30, 0.75);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Hanyi Huangke Xingshu', 'Ma Shan Zheng', 'Noto Serif SC', serif;
    font-size: 14px;
    color: rgba(200, 30, 30, 0.8);
    line-height: 1.3;
    text-align: center;
    letter-spacing: 1px;
    background: rgba(200, 30, 30, 0.03);
    transform: rotate(-3deg);
  }

  /* ---------- 语录主体 ---------- */
  .quote-container {
    text-align: center;
    margin-bottom: 50px;
  }

  .quote-chars {
    display: flex;
    gap: 8px;
    justify-content: center;
    align-items: baseline;
  }

  .quote-char {
    font-family: 'Hanyi Huangke Xingshu', 'Ma Shan Zheng', 'Noto Serif SC', serif;
    font-size: 120px;
    font-weight: 700;
    background: linear-gradient(180deg,
      #c82323 0%,
      #a01414 45%,
      #6e1010 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: none;
    filter: drop-shadow(0 4px 20px rgba(200, 120, 20, 0.2));
    line-height: 1.2;
    animation: charGlow 3s ease-in-out infinite alternate;
  }

  .quote-char:nth-child(1) { animation-delay: 0s; }
  .quote-char:nth-child(2) { animation-delay: 0.15s; }
  .quote-char:nth-child(3) { animation-delay: 0.3s; }
  .quote-char:nth-child(4) { animation-delay: 0.45s; }
  .quote-char:nth-child(5) { animation-delay: 0.6s; }

  /* 逗号和句号 */
  .quote-punct {
    font-family: 'Hanyi Huangke Xingshu', 'Ma Shan Zheng', 'Noto Serif SC', serif;
    font-size: 100px;
    background: linear-gradient(180deg, #c82323 0%, #6e1010 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 4px 20px rgba(200, 120, 20, 0.15));
    line-height: 1.2;
    align-self: center;
  }

  @keyframes charGlow {
    0% {
      filter: drop-shadow(0 4px 15px rgba(200, 120, 20, 0.15));
    }
    100% {
      filter: drop-shadow(0 4px 25px rgba(200, 140, 30, 0.35));
    }
  }

  /* ---------- 装饰线 ---------- */
  .divider {
    width: 240px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(160, 120, 50, 0.5), transparent);
    margin: 30px auto;
    position: relative;
  }

  .divider::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 6px;
    height: 6px;
    background: rgba(160, 120, 50, 0.6);
    border-radius: 50%;
    box-shadow: 0 0 8px rgba(160, 120, 50, 0.3);
  }

  /* ---------- 出处与注释（侧边小字，加大） ---------- */
  .annotation-box {
    position: absolute;
    bottom: 60px;
    right: 80px;
    max-width: 380px;
    text-align: right;
    color: rgba(80, 55, 30, 0.85);
    font-size: 15px;
    line-height: 1.9;
    letter-spacing: 0.5px;
  }

  .annotation-box .source {
    color: rgba(140, 100, 40, 0.9);
    font-size: 16px;
    font-weight: 400;
    margin-bottom: 12px;
    padding-bottom: 10px;
    border-bottom: 1px solid rgba(160, 120, 50, 0.25);
  }

  .annotation-box .source .book {
    font-family: 'Noto Serif SC', serif;
    font-weight: 700;
  }

  .annotation-box .note-label {
    color: rgba(160, 120, 50, 0.8);
    font-size: 14px;
    margin-bottom: 6px;
    letter-spacing: 2px;
  }

  .annotation-box .note-text {
    color: rgba(80, 55, 30, 0.75);
    font-size: 14px;
    line-height: 2;
    text-align: justify;
    text-align-last: right;
  }

  /* ---------- 左下角装饰 ---------- */
  .corner-deco {
    position: absolute;
    bottom: 60px;
    left: 80px;
    color: rgba(130, 95, 55, 0.6);
    font-size: 13px;
    letter-spacing: 3px;
    writing-mode: vertical-rl;
    text-orientation: upright;
  }

  .corner-deco .year {
    font-family: 'Noto Serif SC', serif;
    font-weight: 300;
  }

  /* ---------- 顶部装饰文字 ---------- */
  .top-deco {
    position: absolute;
    top: 60px;
    left: 80px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .top-deco .line {
    width: 40px;
    height: 1px;
    background: rgba(160, 120, 50, 0.5);
  }

  .top-deco .label {
    color: rgba(160, 120, 50, 0.7);
    font-size: 12px;
    letter-spacing: 4px;
    font-weight: 300;
  }

  /* ---------- 响应式 ---------- */
  @media (max-width: 1200px) {
    .quote-char { font-size: 90px; }
    .quote-punct { font-size: 75px; }
    .annotation-box { max-width: 320px; font-size: 14px; }
    .seal { width: 60px; height: 60px; font-size: 12px; }
  }

  @media (max-width: 768px) {
    .quote-char { font-size: 64px; }
    .quote-punct { font-size: 54px; }
    .annotation-box {
      position: relative;
      bottom: auto;
      right: auto;
      max-width: 90%;
      margin: 20px auto;
      text-align: center;
    }
    .annotation-box .note-text { text-align-last: center; }
    .corner-deco, .seal, .top-deco { display: none; }
  }
</style>
</head>
<body>

<div class="wallpaper">
  <!-- 背景纹理 -->
  <div class="texture-overlay"></div>

  <!-- 暖金光晕 -->
  <div class="fire-glow"></div>

  <!-- 火星粒子 -->
  <div class="sparks" id="sparks"></div>

  <!-- 暗角 -->
  <div class="vignette"></div>

  <!-- 内容 -->
  <div class="content">

    <!-- 顶部装饰 -->
    <div class="top-deco">
      <div class="line"></div>
      <span class="label">毛 主 席 语 录</span>
    </div>

    <!-- 印章 -->
    <div class="seal">毛<br>选</div>

    <!-- 语录主体 -->
    <div class="quote-container">
      <div class="quote-chars">
        <span class="quote-char">星</span>
        <span class="quote-char">星</span>
        <span class="quote-char">之</span>
        <span class="quote-char">火</span>
        <span class="quote-punct">，</span>
        <span class="quote-char">可</span>
        <span class="quote-char">以</span>
        <span class="quote-char">燎</span>
        <span class="quote-char">原</span>
      </div>

      <div class="divider"></div>
    </div>

    <!-- 出处与注释 -->
    <div class="annotation-box">
      <div class="source">
        <span class="book">《毛泽东选集》</span> 第一卷<br>
        《星星之火，可以燎原》<br>
        1930年1月5日
      </div>
      <div class="note-label">段 落 注 释</div>
      <div class="note-text">
        毛泽东致林彪的复信。针对当时党内对革命前途的悲观论调，指出革命力量虽处微弱，但反动统治阶级内部矛盾重重、日趋腐朽，革命高潮的到来不可避免。「星星之火，可以燎原」喻指新生事物始于微末，然其生命力旺盛，终将发展壮大、势不可挡。
      </div>
    </div>

    <!-- 左下角竖排装饰 -->
    <div class="corner-deco">
      <span class="year">一九三〇</span>
    </div>

  </div>
</div>

<script>
  // 生成火星粒子
  const sparksContainer = document.getElementById('sparks');
  const sparkCount = 30;

  for (let i = 0; i < sparkCount; i++) {
    const spark = document.createElement('div');
    spark.className = 'spark';

    const size = Math.random() * 4 + 1.5;
    const left = Math.random() * 100;
    const bottom = Math.random() * 30;
    const duration = Math.random() * 8 + 6;
    const delay = Math.random() * 10;

    spark.style.width = size + 'px';
    spark.style.height = size + 'px';
    spark.style.left = left + '%';
    spark.style.bottom = bottom + '%';
    spark.style.animationDuration = duration + 's';
    spark.style.animationDelay = delay + 's';

    sparksContainer.appendChild(spark);
  }
</script>

</body>
</html>
